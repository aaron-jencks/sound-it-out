# prompt_configs.yaml
#
# Per-dataset / language / representation prompt templates and label dicts.
# Structure: datasets.<name>.languages.<lang>.representations.<repr>.

datasets:

  # SST-2 — binary sentiment (English only)
  sst2:
    task_format: classification
    num_tokens_to_predict: 1
    prompt_prefix: ""
    q_prefix: "Review: "
    a_prefix: "Sentiment: "

    languages:
      en:
        representations:
          text:
            label_dict:
              0: ["negative"]
              1: ["positive"]
            token_status:
              negative: "1-tok -> [' negative']"
              positive: "1-tok -> [' positive']"

          romanized:
            label_dict:
              0: ["negative"]
              1: ["positive"]
            token_status:
              negative: "1-tok -> [' negative']"
              positive: "1-tok -> [' positive']"

          ipa:
            q_prefix: "ɹᵻvju: "
            a_prefix: "sɛntɪmənt: "
            label_dict:
              0: ["nɛɡətɪv"]
              1: ["pɑzᵻtɪv"]
            token_status:
              nɛɡətɪv: "1-tok -> [' nɛɡətɪv'] (id 27929)"
              pɑzᵻtɪv: "1-tok -> [' pɑzᵻtɪv'] (id 15051)"
              q_prefix_ɹᵻvju: "1-tok -> [' ɹᵻvju']"
              a_prefix_sɛntɪmənt: "1-tok -> [' sɛntɪmənt']"

  # XNLI — 3-way natural language inference
  xnli:
    task_format: pair
    num_tokens_to_predict: 1
    prompt_prefix: ""
    q_prefix: "Premise: {text1}\nHypothesis: {text2}\n"
    a_prefix: "Relationship: "

    languages:
      en:
        representations:
          text:
            label_dict:
              0: ["entailment"]
              1: ["neutral"]
              2: ["contradiction"]
            token_status:
              entailment:    "3-tok -> [' enta', 'il', 'ment']"
              neutral:       "1-tok -> [' neutral']"
              contradiction: "2-tok -> [' contrad', 'iction']"

          romanized:
            label_dict:
              0: ["entailment"]
              1: ["neutral"]
              2: ["contradiction"]
            token_status:
              entailment:    "3-tok -> [' enta', 'il', 'ment']"
              neutral:       "1-tok -> [' neutral']"
              contradiction: "2-tok -> [' contrad', 'iction']"

          ipa:
            q_prefix: "pɹɛmɪs: {text1}\nhaɪpɑθəsɪs: {text2}\n"
            a_prefix: "ɹᵻleɪʃənʃɪp: "
            label_dict:
              0: ["ɛnteɪlmənt"]
              1: ["nutɹəl"]
              2: ["kɑntɹədɪkʃən"]
            token_status:
              ɛnteɪlmənt:    "3-tok -> [' ɛnt', 'eɪl', 'mənt']"
              nutɹəl:        "1-tok -> [' nutɹəl']"
              kɑntɹədɪkʃən: "3-tok -> [' kɑnt', 'ɹəd', 'ɪkʃən']"

      es:
        representations:
          text:
            label_dict:
              0: ["implica"]
              1: ["neutro"]
              2: ["contradicción"]
            token_status:
              implica:       "1-tok -> [' implica']"
              neutro:        "2-tok -> [' neut', 'ro']"
              contradicción: "2-tok -> [' contrad', 'icción']"

          romanized:
            label_dict:
              0: ["implica"]
              1: ["neutro"]
              2: ["contradiccion"]
            token_status:
              implica:        "1-tok -> [' implica']"
              neutro:         "2-tok -> [' neut', 'ro']"
              contradiccion:  "2-tok -> [' contrad', 'iccion']"

          ipa:
            q_prefix: "pɹɛmɪs: {text1}\nhaɪpɑθəsɪs: {text2}\n"
            a_prefix: "ɹᵻleɪʃənʃɪp: "
            label_dict:
              0: ["implika"]
              1: ["neutɾo"]
              2: ["kontɾaðikθjon"]
            token_status:
              implika:       "1-tok -> [' implika']"
              neutɾo:        "3-tok -> [' ne', 'ut', 'ɾo']"
              kontɾaðikθjon: "2-tok -> [' kontɾa', 'ðikθjon']"

      ru:
        representations:
          text:
            label_dict:
              0: ["следование"]
              1: ["нейтрально"]
              2: ["противоречие"]
            token_status:
              следование:   "2-tok -> [' след', 'ование']"
              нейтрально:   "2-tok -> [' нейт', 'рально']"
              противоречие: "2-tok -> [' противореч', 'ие']"

          romanized:
            label_dict:
              0: ["sledovaniye"]
              1: ["neytral'no"]
              2: ["protivorechiye"]
            token_status:
              sledovaniye:    "3-tok -> [' sled', 'ovan', 'iye']"
              neytral'no:     "4-tok -> [' ney', 'tral', \"'\", 'no']"
              protivorechiye: "2-tok -> [' protivorech', 'iye']"

          ipa:
            q_prefix: "pɹɛmɪs: {text1}\nhaɪpɑθəsɪs: {text2}\n"
            a_prefix: "ɹᵻleɪʃənʃɪp: "
            label_dict:
              0: ["sɭʲidʌvɑnʲijɪ"]
              1: ["nʲijtrɑɭnʌ"]
              2: ["prʌtʲivorʲitʃʲijɪ"]
            token_status:
              sɭʲidʌvɑnʲijɪ:     "3-tok -> [' sɭʲi', 'dʌ', 'vɑnʲijɪ']"
              nʲijtrɑɭnʌ:         "2-tok -> [' nʲijt', 'rɑɭnʌ']"
              prʌtʲivorʲitʃʲijɪ: "3-tok -> [' prʌtʲivo', 'rʲi', 'tʃʲijɪ']"

  # PAWS-X — paraphrase detection (binary)
  pawsx:
    task_format: pair
    num_tokens_to_predict: 1
    prompt_prefix: ""
    q_prefix: "Sentence 1: {text1}\nSentence 2: {text2}\n"
    a_prefix: "Paraphrase: "

    languages:
      en:
        representations:
          text:
            label_dict:
              0: ["No"]
              1: ["Yes"]
            token_status:
              No:  "1-tok -> [' No']"
              Yes: "1-tok -> [' Yes']"

          romanized:
            label_dict:
              0: ["No"]
              1: ["Yes"]
            token_status:
              No:  "1-tok -> [' No']"
              Yes: "1-tok -> [' Yes']"

          ipa:
            q_prefix: "sɛntəns 1: {text1}\nsɛntəns 2: {text2}\n"
            a_prefix: "pæɹəfɹeɪz: "
            label_dict:
              0: ["noʊ"]
              1: ["jɛs"]
            token_status:
              noʊ:  "1-tok -> [' noʊ']"
              jɛs:  "1-tok -> [' jɛs']"
              q_prefix_sɛntəns: "1-tok -> [' sɛntəns']"
              a_prefix_pæɹəfɹeɪz: "3-tok -> [' pæɹə', 'fɹeɪ', 'z']"

      es:
        representations:
          text:
            label_dict:
              0: ["No"]
              1: ["Sí"]
            token_status:
              No: "1-tok -> [' No']  (id 2783)"
              Sí: "1-tok -> [' Sí']  (id 27878)"

          romanized:
            label_dict:
              0: ["No"]
              1: ["Si"]
            token_status:
              No: "1-tok -> [' No']  (id 1329)"
              Si: "1-tok -> [' Si']  (id 3300)"

          ipa:
            q_prefix: "sɛntəns 1: {text1}\nsɛntəns 2: {text2}\n"
            a_prefix: "pæɹəfɹeɪz: "
            label_dict:
              0: ["no"]
              1: ["si"]
            token_status:
              no: "1-tok -> [' no']  (id 554)"
              si: "1-tok -> [' si']  (id 701)"

  # XStoryCloze — story-completion MCQ (binary). eval split is named "eval".
  xstorycloze:
    task_format: mcq
    prompt_prefix: ""
    q_prefix: null
    a_prefix: null

    languages:
      en:
        representations:
          text:     {}
          romanized: {}
          ipa:      {}
      es:
        representations:
          text:     {}
          romanized: {}
          ipa:      {}
      ru:
        representations:
          text:     {}
          romanized: {}
          ipa:      {}
      hi:
        representations:
          text:     {}
          romanized: {}
          ipa:      {}

  # XCopa — causal commonsense MCQ (binary; ta only).
  xcopa:
    task_format: mcq
    prompt_prefix: ""
    q_prefix: null
    a_prefix: null

    languages:
      ta:
        representations:
          text:     {}
          romanized: {}
          ipa:      {}